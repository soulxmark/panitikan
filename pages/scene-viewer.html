<div class="scene-viewer" id="sceneViewer">
  <div class="scene-stage" id="sceneStage">
    <canvas id="sceneCanvas"></canvas>
    <!-- Character layers rendered by JS -->
    <div class="scene-text-overlay">
      <div class="scene-chapter-tag" id="sceneChTag"></div>
      <div class="scene-title" id="sceneTitle"></div>
      <div class="scene-body" id="sceneBody"></div>
      <div class="scene-chars-row" id="sceneCharsRow"></div>
    </div>
    <div class="scene-flash" id="sceneFlash"></div>
    <!-- Controls -->
    <div class="scene-controls">
      <button class="scene-ctrl-btn" id="sceneVoiceBtn" onclick="sceneSpeak()">🔊 BOSES</button>
      <button class="scene-ctrl-btn" id="sceneAutoBtn" onclick="toggleAutoPlay()">▶ AUTO</button>
    </div>
  </div>
  <div class="scene-nav">
    <button class="scene-nav-btn" id="scenePrevBtn" onclick="sceneNav(-1)">← NAKARAAN</button>
    <div class="scene-progress-dots" id="sceneProgDots"></div>
    <button class="scene-nav-btn" id="sceneNextBtn" onclick="sceneNav(1)">SUSUNOD →</button>
    <button class="scene-close-btn" onclick="closeScene()">✕ ISARA</button>
  </div>
</div>
